name: Playwright Tests
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      # ✅ Завантаження артефактів у GitHub Actions (архів)
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: test-results

      # Генерація Allure звіту
      - name: Generate Allure report
        run: npx allure generate allure-results --clean -o allure-report

      # Копіювання артефактів у Allure report для деплою на Pages
      - name: Copy Playwright artifacts to report
        if: always()
        run: |
          mkdir -p allure-report/artifacts
          cp -r test-results/* allure-report/artifacts/ || true

      # Деплой у GitHub Pages
      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3.9.3
        with:
          github_token: ${{ secrets.TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
