name: Playwright Tests

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      # Upload raw artifacts
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: test-results

      # Generate Allure report
      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      # Copy videos/screenshots/traces into report
      - name: Copy Playwright artifacts to report
        if: always()
        run: |
          mkdir -p allure-report/artifacts
          cp -r test-results/* allure-report/artifacts/ || true

      # Deploy to GitHub Pages
      - name: Deploy report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3.9.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

      # Print report URL in Actions UI
      - name: Show Allure Report URL
        if: always()
        run: |
          echo "Allure Report:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

          echo "## Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY